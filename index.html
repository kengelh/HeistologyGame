  <!-- 
      Apply a default monospace font to the body to create a retro, "hacker terminal" aesthetic.
      This gives the game a consistent, stylized look and feel that matches the heist theme.
    -->
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
    }

    @keyframes screen-rattle {

      0%,
      100% {
        transform: translate(0, 0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translate(-2px, -2px) rotate(-1deg);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translate(2px, 2px) rotate(1deg);
      }
    }

    .screen-rattle {
      animation: screen-rattle 0.5s ease-in-out;
    }

    @keyframes explosion-fade-out {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(2.5);
      }
    }

    .explosion-text {
      animation: explosion-fade-out 0.5s ease-out forwards;
    }

    @keyframes dizzy-stars {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }

      50% {
        transform: translateY(-10px) rotate(180deg);
        opacity: 1;
      }

      100% {
        transform: translateY(0) rotate(360deg);
        opacity: 0;
      }
    }

    .dizzy-star {
      animation: dizzy-stars 1.5s linear infinite;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    @keyframes rotate-left {
      from {
        transform: translateX(-100%) skewX(-15deg);
      }

      to {
        transform: translateX(100vw) skewX(-15deg);
      }
    }

    @keyframes rotate-right {
      from {
        transform: translateX(100%) skewX(-15deg);
      }

      to {
        transform: translateX(-100vw) skewX(-15deg);
      }
    }

    .alarm-light-red {
      animation: rotate-left 2s infinite linear;
    }

    .alarm-light-blue {
      animation: rotate-right 2s infinite linear 1s;
      /* 1s delay */
    }

    /* Animation for the blue "ESCAP" letters: pulses with a red glow */
    @keyframes escap-pulse {

      0%,
      50%,
      100% {
        text-shadow: var(--base-shadow);
      }

      25% {
        text-shadow: var(--base-shadow), var(--pulse-shadow);
      }
    }

    /* Animation for the red "OLOGY" letters: pulses with a blue glow */
    @keyframes ology-pulse {

      0%,
      50%,
      100% {
        text-shadow: var(--base-shadow);
      }

      75% {
        text-shadow: var(--base-shadow), var(--pulse-shadow);
      }
    }

    @keyframes flash-red {

      0%,
      100% {
        fill: #ef4444;
      }

      /* red-500 */
      50% {
        fill: #7f1d1d;
      }

      /* red-900 */
    }

    @keyframes flash-blue {

      0%,
      100% {
        fill: #3b82f6;
      }

      /* blue-500 */
      50% {
        fill: #1e3a8a;
      }

      /* blue-900 */
    }

    .police-light-red {
      animation: flash-red 1s infinite step-end;
    }

    .police-light-blue {
      animation: flash-blue 1s infinite step-end;
      animation-delay: 0.5s;
    }

    @keyframes tic-toc {

      0%,
      100% {
        transform: rotate(-10deg);
      }

      50% {
        transform: rotate(10deg);
      }
    }

    .tic-toc {
      animation: tic-toc 1s ease-in-out infinite;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes blink-caret {

      from,
      to {
        border-color: transparent
      }

      50% {
        border-color: currentColor;
      }
    }

    .typing-cursor::after {
      content: '_';
      animation: blink-caret 1.2s step-end infinite;
      margin-left: 0.25rem;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes scale-in {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-scale-in {
      animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes scan {
      0% {
        top: 0%;
      }

      100% {
        top: 100%;
      }
    }

    .animate-scan {
      animation: scan 4s linear infinite;
    }

  <!-- 
      The importmap is a modern browser feature that allows mapping module specifiers 
      to specific URLs. This is a key part of the project's architecture, as it avoids 
      the need for a bundler like Webpack or Rollup. 
      
      How it works:
      - When the browser sees an `import React from 'react';` statement in a JavaScript file,
        it consults this importmap.
      - It finds the key "react" and resolves it to the provided CDN URL.
      - This allows for writing standard ES module import statements that work directly in the browser
        without any build step.

      Dependencies & Potential Issues:
      - This creates a hard dependency on the `aistudiocdn.com` service. If this CDN is down, the entire application will fail to load.
      - Browser compatibility: Import maps are supported in all modern browsers but will not work in older ones (e.g., Internet Explorer).
      - For a production-grade application, bundling dependencies locally is generally a more robust and performant approach.
    -->
  <script type="importmap">
      {
        "imports": {
          "react": "https://aistudiocdn.com/react@^19.1.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
          "react/": "https://aistudiocdn.com/react@^19.1.1/",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0"
        }
      }
    </script>
